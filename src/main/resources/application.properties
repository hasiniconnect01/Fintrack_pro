spring.application.name=demo

# MySQL database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/fintrack_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=Hasini99

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# OCR configuration. Override TESSDATA_PATH in deployment instead of changing source code.
fintrack.ocr.tessdata-path=${TESSDATA_PATH:C:/Program Files/Tesseract-OCR/tessdata}
fintrack.default-monthly-budget=50000
fintrack.transaction-limit=10000
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
