spring.application.name=demo

# File-based H2 so accounts survive server restarts
spring.datasource.url=jdbc:h2:file:./data/fintrack_db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# OCR configuration. Override TESSDATA_PATH in deployment instead of changing source code.
fintrack.ocr.tessdata-path=${TESSDATA_PATH:C:/Program Files/Tesseract-OCR/tessdata}
fintrack.default-monthly-budget=50000
fintrack.transaction-limit=10000
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
